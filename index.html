<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON CHARADES | EXTREME</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="particles-js"></div>
    
    <div class="game-wrapper">
        <div id="start-screen" class="screen active">
            <h1 class="logo">NEON <span>CHARADES</span></h1>
            <p class="tagline">აუხსენი სიტყვა პარტნიორს ან მოემზადე სასჯელისთვის!</p>
            <button onclick="startGame()" class="btn-main">თამაშის დაწყება</button>
        </div>

        <div id="play-screen" class="screen">
            <div class="timer-circle">
                <div class="timer" id="timer">60</div>
            </div>
            <div class="word-card" id="word-display">...</div>
            <div class="controls">
                <button onclick="nextWord(false)" class="btn-fail">✖ ვერა</button>
                <button onclick="nextWord(true)" class="btn-success">✔ გამოიცნო</button>
            </div>
        </div>

        <div id="result-screen" class="screen">
            <h2 class="neon-text">დრო ამოიწურა!</h2>
            <div class="final-score">ქულა: <span id="final-points">0</span></div>
            
            <div class="punishment-box">
                <h3 class="flash-text">🔥 წაგებულის სურვილი:</h3>
                <p id="punishment-text">იტვირთება...</p>
            </div>

            <button onclick="location.reload()" class="btn-main">შემდეგი წყვილი</button>
        </div>
    </div>

    <audio id="correct-sound" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"></audio>
    <audio id="tick-sound" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
