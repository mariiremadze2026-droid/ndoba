<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON CHARADES PRO</title>

    <style>
        :root { 
            --neon: #00ff88; 
            --red: #ff0055; 
            --dark: #0a0a0b;
            --card-bg: rgba(20, 20, 25, 0.8);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            margin: 0; 
            background: var(--dark); 
            color: white; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #particles-js { position: fixed; width: 100%; height: 100%; z-index: -1; }

        .game-wrapper {
            width: 90%;
            max-width: 450px;
            z-index: 10;
        }

        .screen { 
            display: none; 
            background: var(--card-bg);
            padding: 30px 20px;
            border-radius: 24px;
            border: 1px solid rgba(0, 255, 136, 0.2);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            animation: slideIn 0.3s ease-out;
            text-align: center;
        }

        .active { display: block; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1.logo { font-size: 2.2rem; margin-bottom: 10px; }
        .logo span { color: var(--red); text-shadow: 0 0 15px var(--red); }

        .input-group { display: flex; gap: 5px; margin-bottom: 20px; }

        input { 
            flex: 1; 
            padding: 12px; 
            border: none; 
            border-radius: 10px;
            outline: none;
        }

        .player-list { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }

        .player-tag { 
            background: rgba(0,255,136,0.1); 
            color: var(--neon); 
            padding: 6px 12px; 
            border-radius: 20px; 
            border: 1px solid var(--neon);
        }

        .word-card { 
            font-size: 2rem; 
            font-weight: bold; 
            color: var(--neon);
            margin: 30px 0;
        }

        .timer-circle { 
            width: 70px; height: 70px; 
            border: 4px solid var(--red); 
            border-radius: 50%; 
            margin: 0 auto 20px; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            font-size: 1.5rem;
        }

        button { 
            cursor: pointer; 
            border: none; 
            padding: 14px; 
            border-radius: 12px; 
            font-weight: bold; 
            width: 100%;
        }

        .btn-main { background: var(--neon); color: black; margin-top: 10px; }

        .btn-secondary { background: #222; color: white; width: auto; }

        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        .btn-success { background: #00ff88; }
        .btn-fail { background: #333; color: #ff0055; }
    </style>
</head>

<body>

<div id="particles-js"></div>

<div class="game-wrapper">

    <div id="start-screen" class="screen active">
        <h1 class="logo">NEON<span>CHARADES</span></h1>
        <button onclick="showScreen('lobby-screen')" class="btn-main">დაწყება</button>
    </div>

    <div id="lobby-screen" class="screen">
        <h2>მოთამაშეები</h2>
        <div class="input-group">
            <input id="player-name-input" placeholder="სახელი...">
            <button class="btn-secondary" onclick="addPlayer()">OK</button>
        </div>
        <div id="player-list-display" class="player-list"></div>
        <button id="pair-btn" class="btn-main" onclick="generatePairs()" style="display:none;">დაწყება</button>
    </div>

    <div id="pairs-screen" class="screen">
        <div id="current-pair-display" class="word-card">...</div>
        <button class="btn-main" onclick="startRound()">READY</button>
    </div>

    <div id="play-screen" class="screen">
        <div class="timer-circle" id="timer">40</div>
        <div class="word-card" id="word-display">...</div>
        <div class="controls">
            <button class="btn-fail" onclick="nextWord(false)">FAIL</button>
            <button class="btn-success" onclick="nextWord(true)">DONE</button>
        </div>
    </div>

    <div id="result-screen" class="screen">
        <h2>TIME OVER</h2>
        <div id="round-results"></div>
        <p id="punishment-text"></p>
        <button class="btn-main" onclick="showNextPair()">NEXT</button>
    </div>

</div>

<audio id="correct-sound" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"></audio>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

<script>
const words = ["ხინკალი","ბეტმენი","პინგვინი","სელფი","ტიკტოკი","შაურმა","გიტარა","ზვიგენი","კოსმოსი","აიფონი"];
const punishments = ["15 აზიდვა","იმღერე","20 ჩაჯდომა","პლანკა 40წმ","იცეკვე"];

let players=[], pairs=[], currentPairIndex=0, score=0, timeLeft=40, timerId;

function showScreen(id){
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function addPlayer(){
    let input=document.getElementById("player-name-input");
    if(input.value.trim()){
        players.push(input.value.trim());
        input.value="";
        document.getElementById("player-list-display").innerHTML =
        players.map(p=>`<span class="player-tag">${p}</span>`).join("");
        if(players.length>=2) document.getElementById("pair-btn").style.display="block";
    }
}

function generatePairs(){
    let shuffled=[...players].sort(()=>Math.random()-0.5);
    pairs=[];
    for(let i=0;i<shuffled.length;i+=2){
        pairs.push([shuffled[i],shuffled[i+1]||shuffled[0]]);
    }
    currentPairIndex=0;
    showNextPair();
}

function showNextPair(){
    if(currentPairIndex>=pairs.length){
        alert("Game Over");
        location.reload();
        return;
    }
    document.getElementById("current-pair-display").innerText =
    pairs[currentPairIndex].join(" + ");
    showScreen("pairs-screen");
}

function startRound(){
    score=0;
    timeLeft=40;
    showScreen("play-screen");
    nextWord();
    clearInterval(timerId);
    timerId=setInterval(()=>{
        timeLeft--;
        document.getElementById("timer").innerText=timeLeft;
        if(timeLeft<=0){
            clearInterval(timerId);
            endRound();
        }
    },1000);
}

function nextWord(correct){
    if(correct){
        score++;
        document.getElementById("correct-sound").play().catch(()=>{});
    }
    document.getElementById("word-display").innerText =
    words[Math.floor(Math.random()*words.length)];
}

function endRound(){
    document.getElementById("round-results").innerText="Score: "+score;
    document.getElementById("punishment-text").innerText =
    punishments[Math.floor(Math.random()*punishments.length)];
    showScreen("result-screen");
    currentPairIndex++;
}

function showNextPair(){
    currentPairIndex++;
    showNextPair();
}

window.onload=()=>{
    if(window.particlesJS){
        particlesJS("particles-js",{particles:{number:{value:30},move:{speed:1}}});
    }
}
</script>

</body>
</html>
