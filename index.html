<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON CHARADES PRO</title>
    <style>
        :root { 
            --neon: #00ff88; 
            --red: #ff0055; 
            --dark: #0a0a0b;
            --card-bg: rgba(20, 20, 25, 0.8);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            margin: 0; 
            background: var(--dark); 
            color: white; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* ანიმაციური ფონი */
        #particles-js { position: fixed; width: 100%; height: 100%; z-index: -1; }

        .game-wrapper {
            width: 90%;
            max-width: 450px;
            z-index: 10;
        }

        .screen { 
            display: none; 
            background: var(--card-bg);
            padding: 30px 20px;
            border-radius: 24px;
            border: 1px solid rgba(0, 255, 136, 0.2);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            animation: slideIn 0.3s ease-out;
            text-align: center;
        }

        .active { display: block; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1.logo { 
            font-size: 2.2rem; 
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        .logo span { color: var(--red); text-shadow: 0 0 15px var(--red); }

        .tagline { color: #888; font-size: 0.9rem; margin-bottom: 25px; }

        /* ლობის სტილი */
        .input-group { 
            display: flex; 
            background: rgba(255,255,255,0.05);
            padding: 5px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid #333;
        }
        
        input { 
            flex: 1; 
            background: transparent; 
            border: none; 
            color: white; 
            padding: 12px; 
            font-size: 1rem;
            outline: none;
        }

        .player-list { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 8px; 
            margin-bottom: 20px; 
            justify-content: center;
            max-height: 150px;
            overflow-y: auto;
        }

        .player-tag { 
            background: rgba(0, 255, 136, 0.1); 
            color: var(--neon); 
            padding: 6px 14px; 
            border-radius: 20px; 
            border: 1px solid var(--neon);
            font-size: 0.85rem; 
        }

        /* ბარათის სტილი */
        .word-card { 
            font-size: 2.5rem; 
            font-weight: 800; 
            color: var(--neon);
            margin: 30px 0;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.4);
        }

        .timer-circle { 
            width: 70px; height: 70px; 
            border: 4px solid var(--red); 
            border-radius: 50%; 
            margin: 0 auto 20px; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--red);
            box-shadow: 0 0 15px var(--red);
        }

        /* ღილაკები */
        button { 
            font-family: inherit;
            cursor: pointer; 
            border: none; 
            padding: 16px; 
            border-radius: 14px; 
            font-weight: bold; 
            font-size: 1rem;
            transition: 0.2s;
            width: 100%;
        }

        .btn-main { 
            background: var(--neon); 
            color: black; 
            box-shadow: 0 5px 15px rgba(0, 255, 136, 0.3);
            margin-top: 10px;
        }

        .btn-main:active { transform: scale(0.97); }

        .btn-secondary { 
            background: #222; 
            color: white; 
            width: auto;
            padding: 10px 20px;
        }

        .controls { display: grid; grid-template-columns: 1fr 1.5fr; gap: 12px; }
        
        .btn-success { background: #00ff88; color: black; }
        .btn-fail { background: #333; color: #ff0055; border: 1px solid #ff0055; }

        /* სასჯელის ყუთი */
        .punishment-box {
            background: rgba(255, 0, 85, 0.05);
            border: 1px solid var(--red);
            padding: 20px;
            border-radius: 16px;
            margin: 20px 0;
        }
        .punishment-text { color: #ff88aa; font-size: 1.2rem; margin-top: 10px; font-weight: bold; }

    </style>
</head>
<body>
    <div id="particles-js"></div>

    <div class="game-wrapper">
        <div id="start-screen" class="screen active">
            <h1 class="logo">NEON<span>CHARADES</span></h1>
            <p class="tagline">გამოწვევა წყვილებისთვის</p>
            <button onclick="showScreen('lobby-screen')" class="btn-main">დაწყება</button>
        </div>

        <div id="lobby-screen" class="screen">
            <h2 style="margin-top:0">მოთამაშეები</h2>
            <div class="input-group">
                <input type="text" id="player-name-input" placeholder="ჩაწერე სახელი...">
                <button onclick="addPlayer()" class="btn-secondary">OK</button>
            </div>
            <div id="player-list-display" class="player-list"></div>
            <button id="pair-btn" onclick="generatePairs()" class="btn-main" style="display:none;">წყვილების დაწყვილება</button>
        </div>

        <div id="pairs-screen" class="screen">
            <p style="color:#888">შემდეგი წყვილი:</p>
            <div id="current-pair-display" class="word-card" style="font-size: 1.8rem; border: 1px dashed var(--neon); border-radius: 20px;">...</div>
            <button onclick="startRound()" class="btn-main">READY!</button>
        </div>

        <div id="play-screen" class="screen">
            <div class="timer-circle" id="timer">40</div>
            <div class="word-card" id="word-display">...</div>
            <div class="controls">
                <button onclick="nextWord(false)" class="btn-fail">VERA</button>
                <button onclick="nextWord(true)" class="btn-success">DONE</button>
            </div>
        </div>

        <div id="result-screen" class="screen">
            <h2 style="color:var(--red); margin:0">TIME OVER!</h2>
            <div id="round-results" style="font-size: 1.5rem; margin: 15px 0;">ქულა: 0</div>
            <div class="punishment-box">
                <span style="color:var(--red); font-size: 0.8rem; text-transform: uppercase;">სასჯელი წაგებულს</span>
                <p id="punishment-text" class="punishment-text">...</p>
            </div>
            <button onclick="showNextPair()" class="btn-main">შემდეგი წყვილი</button>
        </div>
    </div>

    <audio id="correct-sound" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"></audio>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        const words = ["ხინკალი", "ბეტმენი", "პინგვინი", "სელფი", "ტიკტოკი", "შაურმა", "გიტარა", "ზვიგენი", "კოსმოსი", "აიფონი", "პროგრამისტი", "მწვადი", "ფეხბურთი", "დინოზავრი", "სპაიდერმენი", "ბებიაჩემი", "ტესლა", "ჰარი პოტერი", "ლოკოკინა", "მეკობრე", "ფორტნაიტი", "ინსტაგრამი", "კოკა-კოლა"];
        const punishments = ["15 აზიდვა", "იმღერე ხმამაღლა", "დალიე წყალი ერთი ამოსუნთქვით", "20 ჩაჯდომა", "დადე სასაცილო სთორი", "ილაპარაკე აქცენტით", "პლანკა 40 წამი", "ეცეკვე პარტნიორს"];

        let players = [], pairs = [], currentPairIndex = 0, score = 0, timeLeft = 40, timerId;

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function addPlayer() {
            const input = document.getElementById('player-name-input');
            const name = input.value.trim();
            if (name) {
                players.push(name);
                input.value = "";
                document.getElementById('player-list-display').innerHTML = players.map(p => `<span class="player-tag">${p}</span>`).join("");
                if (players.length >= 2) document.getElementById('pair-btn').style.display = "block";
            }
        }

        function generatePairs() {
            let shuffled = [...players].sort(() => Math.random() - 0.5);
            pairs = [];
            for (let i = 0; i < shuffled.length; i += 2) {
                if (shuffled[i + 1]) pairs.push([shuffled[i], shuffled[i+1]]);
                else pairs.push([shuffled[i], shuffled[0]]);
            }
            currentPairIndex = 0;
            showNextPair();
        }

        function showNextPair() {
            if (currentPairIndex < pairs.length) {
                document.getElementById('current-pair-display').innerText = `${pairs[currentPairIndex][0]} + ${pairs[currentPairIndex][1]}`;
                showScreen('pairs-screen');
            } else {
                alert("ყველა წყვილმა ითამაშა!");
                location.reload();
            }
        }

        function startRound() {
            score = 0; timeLeft = 40;
            document.getElementById('timer').innerText = timeLeft;
            showScreen('play-screen');
            nextWord(null);
            if (timerId) clearInterval(timerId);
            timerId = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft;
                if (timeLeft <= 0) { clearInterval(timerId); endRound(); }
            }, 1000);
        }

        function nextWord(isCorrect) {
            if (isCorrect) { 
                score++; 
                document.getElementById('correct-sound').play().catch(()=>{}); 
            }
            document.getElementById('word-display').innerText = words[Math.floor(Math.random() * words.length)];
        }

        function endRound() {
            document.getElementById('round-results').innerText = `ქულა: ${score}`;
            document.getElementById('punishment-text').innerText = punishments[Math.floor(Math.random() * punishments.length)];
            showScreen('result-screen');
            currentPairIndex++;
        }

        window.addEventListener('load', () => {
            if (window.particlesJS) {
                particlesJS("particles-js", { "particles": { "number": { "value": 40 }, "color": { "value": "#00ff88" }, "move": { "enable": true, "speed": 1 } } });
            }
        });
