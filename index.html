<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON CHARADES | 40s EXTREME</title>
    <style>
        /* CSS ნაწილი */
        :root { --neon: #00ff88; --red: #ff0055; --bg: #050505; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #particles-js { position: fixed; width: 100%; height: 100%; z-index: -1; }
        .scanline { width: 100%; height: 5px; background: rgba(0, 255, 136, 0.05); position: absolute; animation: scan 3s linear infinite; pointer-events: none; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100vh; } }
        .game-wrapper { height: 100vh; display: flex; justify-content: center; align-items: center; text-align: center; }
        .screen { display: none; width: 90%; max-width: 400px; animation: fadeIn 0.4s ease; z-index: 10; }
        .active { display: block !important; }
        .logo { font-size: 2.5rem; text-shadow: 0 0 10px var(--neon); }
        .logo span { color: var(--red); text-shadow: 0 0 10px var(--red); }
        .tagline { color: #888; margin-bottom: 20px; }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #111; color: white; outline: none; }
        .player-list { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-bottom: 20px; min-height: 30px; }
        .player-tag { background: var(--neon); color: black; padding: 5px 12px; border-radius: 15px; font-weight: bold; font-size: 0.8rem; }
        .word-card { background: rgba(255, 255, 255, 0.05); padding: 40px 20px; border-radius: 20px; border: 2px solid var(--neon); font-size: 2.2rem; font-weight: bold; margin-bottom: 20px; color: var(--neon); box-shadow: 0 0 20px rgba(0, 255, 136, 0.1); }
        .timer-circle { width: 80px; height: 80px; border: 3px solid var(--red); border-radius: 50%; margin: 0 auto 15px; display: flex; justify-content: center; align-items: center; box-shadow: 0 0 15px var(--red); }
        .timer { font-size: 2rem; font-weight: bold; color: var(--red); }
        .controls { display: flex; gap: 10px; }
        button { cursor: pointer; border: none; padding: 15px; border-radius: 10px; font-weight: bold; transition: 0.2s; }
        .btn-main { background: var(--neon); color: black; width: 100%; font-size: 1.1rem; box-shadow: 0 0 15px var(--neon); }
        .btn-secondary { background: #333; color: white; }
        .btn-success { background: #2ecc71; color: white; width: 100%; }
        .btn-fail { background: var(--red); color: white; width: 100%; }
        .punishment-box { background: rgba(255, 0, 85, 0.1); border: 2px dashed var(--red); padding: 20px; margin: 20px 0; border-radius: 15px; }
        .flash-text { animation: blink 0.8s infinite; color: var(--red); }
        @keyframes blink { 50% { opacity: 0; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="particles-js"></div>
    <div class="scanline"></div>

    <div class="game-wrapper">
        <div id="start-screen" class="screen active">
            <h1 class="logo">NEON <span>CHARADES</span></h1>
            <p class="tagline">40 წამი, წყვილები და სასჯელები!</p>
            <button onclick="showScreen('lobby-screen')" class="btn-main">დაწყება</button>
        </div>

        <div id="lobby-screen" class="screen">
            <h2 class="neon-text">მოთამაშეები</h2>
            <div class="input-group">
                <input type="text" id="player-name-input" placeholder="სახელი...">
                <button onclick="addPlayer()" class="btn-secondary">დამატება</button>
            </div>
            <div id="player-list-display" class="player-list"></div>
            <button id="pair-btn" onclick="generatePairs()" class="btn-main" style="display:none;">წყვილების შექმნა</button>
        </div>

        <div id="pairs-screen" class="screen">
            <h2 class="neon-text">შემდეგი წყვილი:</h2>
            <div id="current-pair-display" class="word-card">...</div>
            <button onclick="startRound()" class="btn-main">დავიწყოთ!</button>
        </div>

        <div id="play-screen" class="screen">
            <div class="timer-circle"><div class="timer" id="timer">40</div></div>
            <div class="word-card" id="word-display">...</div>
            <div class="controls">
                <button onclick="nextWord(false)" class="btn-fail">✖ ვერა</button>
                <button onclick="nextWord(true)" class="btn-success">✔ გამოიცნო</button>
            </div>
        </div>

        <div id="result-screen" class="screen">
            <h2 class="neon-text">დრო ამოიწურა!</h2>
            <div id="round-results" class="final-score" style="font-size: 2rem; margin: 10px 0;">ქულა: 0</div>
            <div class="punishment-box">
                <h3 class="flash-text">🔥 სასჯელი:</h3>
                <p id="punishment-text">...</p>
            </div>
            <button onclick="showNextPair()" class="btn-main">შემდეგი წყვილი</button>
        </div>
    </div>

    <audio id="correct-sound" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"></audio>
    <audio id="tick-sound" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        const words = ["ხინკალი", "ბეტმენი", "პინგვინი", "სელფი", "ტიკტოკი", "შაურმა", "გიტარა", "ზვიგენი", "კოსმოსი", "აიფონი", "პროგრამისტი", "მწვადი", "ფეხბურთი", "დინოზავრი", "სპაიდერმენი", "ბებიაჩემი", "ტესლა", "ჰარი პოტერი", "ლოკოკინა", "მეკობრე"];
        const punishments = ["15 აზიდვა (отжимание)", "იმღერე ოპერა", "დალიე წყალი ერთი ამოსუნთქვით", "20 ჩაჯდომა", "დადე სასაცილო სთორი", "ილაპარაკე აქცენტით", "პლანკა 45 წამი", "ცეკვა მუსიკის გარეშე"];

        let players = [], pairs = [], currentPairIndex = 0, score = 0, timeLeft = 40, timerId;

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function addPlayer() {
            const input = document.getElementById('player-name-input');
            const name = input.value.trim();
            if (name) {
                players.push(name);
                input.value = "";
                document.getElementById('player-list-display').innerHTML = players.map(p => `<span class="player-tag">${p}</span>`).join("");
                if (players.length >= 2) document.getElementById('pair-btn').style.display = "block";
            }
        }

        function generatePairs() {
            let shuffled = [...players].sort(() => Math.random() - 0.5);
            pairs = [];
            for (let i = 0; i < shuffled.length; i += 2) {
                if (shuffled[i + 1]) pairs.push([shuffled[i], shuffled[i+1]]);
                else pairs.push([shuffled[i], shuffled[0]]); // კენტის შემთხვევაში პირველს უწყვილდება
            }
            currentPairIndex = 0;
            showNextPair();
        }

        function showNextPair() {
            if (currentPairIndex < pairs.length) {
                document.getElementById('current-pair-display').innerText = `${pairs[currentPairIndex][0]} & ${pairs[currentPairIndex][1]}`;
                showScreen('pairs-screen');
            } else {
                alert("ყველა წყვილმა ითამაშა! თამაში თავიდან დაიწყება.");
                location.reload();
            }
        }

        function startRound() {
            score = 0; timeLeft = 40;
            document.getElementById('timer').innerText = timeLeft;
            showScreen('play-screen');
            nextWord(null);
            if (timerId) clearInterval(timerId);
            timerId = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft;
                if (timeLeft <= 0) { clearInterval(timerId); endRound(); }
            }, 1000);
        }

        function nextWord(isCorrect) {
            if (isCorrect === true) { 
                score++; 
                document.getElementById('correct-sound').play().catch(()=>{}); 
            } else if (isCorrect === false) {
                document.getElementById('tick-sound').play().catch(()=>{});
            }
            document.getElementById('word-display').innerText = words[Math.floor(Math.random() * words.length)];
        }

        function endRound() {
            document.getElementById('round-results').innerText = `ქულა: ${score}`;
            document.getElementById('punishment-text').innerText = punishments[Math.floor(Math.random() * punishments.length)];
            showScreen('result-screen');
            currentPairIndex++;
        }

        window.addEventListener('load', () => {
            if (window.particlesJS) {
                particlesJS("particles-js", { "particles": { "number": { "value": 40 }, "color": { "value": "#00ff88" }, "move": { "enable": true, "speed": 1 } } });
            }
        });
    </script>
</body>
</html>
