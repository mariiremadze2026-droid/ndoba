<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PARTY CHARADES 🔥</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
font-family:Arial;
background:#050507;
color:white;
}

/* 🌌 background */
body::before{
content:"";
position:absolute;
inset:-60%;
background:
radial-gradient(circle at 20% 20%, rgba(255,0,0,0.25), transparent 40%),
radial-gradient(circle at 80% 30%, rgba(0,0,0,0.9), transparent 50%),
radial-gradient(circle at 50% 80%, rgba(255,0,85,0.15), transparent 45%);
filter:blur(70px);
animation:move 10s infinite alternate;
z-index:0;
}

@keyframes move{
0%{transform:scale(1);}
100%{transform:scale(1.2);}
}

.screen{
display:none;
text-align:center;
padding:20px;
background:rgba(20,0,0,0.75);
border-radius:20px;
width:90%;
max-width:420px;
z-index:2;
backdrop-filter:blur(10px);
border:1px solid rgba(255,0,0,0.3);
}

.active{display:block;}

button{
padding:16px;
width:100%;
margin:6px;
border:none;
border-radius:12px;
font-size:1rem;
font-weight:bold;
cursor:pointer;
}

.btn{background:#ff0033;color:white;}

input{
padding:12px;
width:100%;
border-radius:10px;
border:none;
margin:6px 0;
}

.player{
display:inline-block;
padding:6px 10px;
margin:4px;
border:1px solid #ff0033;
border-radius:20px;
color:#ff0033;
}

.word{
font-size:2rem;
color:#ff0033;
margin:15px 0;
}
</style>
</head>

<body>

<!-- START -->
<div id="start" class="screen active">
<h1>🔥 PARTY CHARADES</h1>
<button class="btn" onclick="show('lobby')">START</button>
</div>

<!-- LOBBY -->
<div id="lobby" class="screen">
<h2>👥 Players</h2>
<input id="inp" placeholder="სახელი">
<button class="btn" onclick="add()">ADD</button>
<div id="list"></div>

<h3>🎯 Categories</h3>
<label><input type="checkbox" value="food" checked> 🍕 Food</label><br>
<label><input type="checkbox" value="movies" checked> 🎬 Movies</label><br>
<label><input type="checkbox" value="animals" checked> 🐾 Animals</label><br>
<label><input type="checkbox" value="tech" checked> 📱 Tech</label><br>

<button id="startBtn" class="btn" style="display:none" onclick="startGame()">START GAME</button>
</div>

<!-- PLAY -->
<div id="play" class="screen">
<h2>🎮 YOUR WORD</h2>
<div class="word" id="word">---</div>
<button class="btn" onclick="nextPlayer()">NEXT PLAYER</button>
</div>

<!-- GAME -->
<div id="game" class="screen">
<h2>🔥 ACT / GUESS</h2>
<p>Have fun 😎</p>
<button class="btn" onclick="nextWord()">NEXT WORD</button>
</div>

<script>

/* WORD BANK */
const wordBank={
food:["ხინკალი","პიცა","ხაჭაპური","შაურმა"],
movies:["ბეტმენი","ჯოკერი","ავატარი","მატრიქსი"],
animals:["ლომი","ვეფხვი","ზვიგენი","სპილო"],
tech:["აიფონი","ლეპტოპი","დრონი","კომპიუტერი"]
};

let players=[];
let words=[];
let currentPlayer=0;

/* UI */
function show(id){
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

/* add player */
function add(){
let v=document.getElementById('inp').value.trim();
if(!v)return;
players.push(v);
document.getElementById('inp').value="";
document.getElementById('list').innerHTML=
players.map(p=>`<span class="player">${p}</span>`).join("");
if(players.length>=2)
document.getElementById('startBtn').style.display="block";
}

/* get pool */
function getPool(){
let pool=[];
document.querySelectorAll('input[type=checkbox]').forEach(c=>{
if(c.checked) pool=pool.concat(wordBank[c.value]);
});
return pool;
}

/* start */
function startGame(){
words=getPool().sort(()=>Math.random()-0.5);
currentPlayer=0;
show('play');
showWord();
}

/* show word */
function showWord(){
document.getElementById('word').innerText=
players[currentPlayer]+": "+words[0];
}

/* next player */
function nextPlayer(){
currentPlayer++;
if(currentPlayer>=players.length){
alert("🎉 Round finished!");
location.reload();
}else{
showWord();
}
}

/* next word */
function nextWord(){
words.shift();
if(words.length===0){
words=getPool().sort(()=>Math.random()-0.5);
}
showWord();
}

</script>

</body>
</html>
