<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON CHARADES 🔥</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
font-family:Arial;
color:white;
background:#050507;
position:relative;
}

/* 🔥 red + black glow background */
body::before{
content:"";
position:absolute;
inset:-60%;
background:
radial-gradient(circle at 20% 20%, rgba(255,0,0,0.25), transparent 40%),
radial-gradient(circle at 80% 30%, rgba(0,0,0,0.8), transparent 50%),
radial-gradient(circle at 50% 80%, rgba(255,0,85,0.15), transparent 45%);
filter:blur(70px);
animation:moveGlow 10s ease-in-out infinite alternate;
z-index:0;
}

body::after{
content:"";
position:absolute;
inset:0;
background:
linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
background-size:40px 40px;
opacity:0.15;
z-index:0;
}

/* ⭐ stars */
.star{
position:absolute;
width:3px;
height:3px;
background:white;
border-radius:50%;
animation:twinkle 3s infinite ease-in-out;
box-shadow:0 0 8px white;
opacity:0.3;
}

@keyframes twinkle{
0%{opacity:0.1;transform:scale(0.5);}
50%{opacity:1;transform:scale(1.3);}
100%{opacity:0.1;transform:scale(0.5);}
}

@keyframes moveGlow{
0%{transform:scale(1);}
100%{transform:scale(1.2) translate(20px,-20px);}
}

/* UI */
.screen{
display:none;
text-align:center;
padding:25px;
background:rgba(20,0,0,0.75);
border-radius:20px;
z-index:2;
backdrop-filter: blur(10px);
width:90%;
max-width:420px;
border:1px solid rgba(255,0,0,0.3);
}

.active{display:block;}

button{
padding:18px;
width:100%;
margin:6px;
border:none;
border-radius:14px;
font-size:1.1rem;
font-weight:bold;
cursor:pointer;
transition:0.2s;
}

button:active{transform:scale(0.96);}

.btn-main{
background:#ff0033;
color:white;
box-shadow:0 0 25px rgba(255,0,0,0.5);
}

.btn-fail{
background:#111;
color:#ff0033;
border:1px solid #ff0033;
}

.btn-success{
background:#ff0033;
color:white;
}

input{
padding:14px;
width:100%;
border:none;
border-radius:10px;
margin:8px 0;
outline:none;
}

.word{
font-size:2.2rem;
margin:20px 0;
color:#ff0033;
text-shadow:0 0 15px rgba(255,0,0,0.6);
}

.timer{
font-size:2.5rem;
color:#ff0033;
text-shadow:0 0 15px rgba(255,0,0,0.6);
}

.player-tag{
display:inline-block;
padding:6px 12px;
margin:4px;
border:1px solid #ff0033;
border-radius:20px;
color:#ff0033;
}
</style>
</head>

<body>

<div id="stars"></div>

<!-- 😄 GAME -->
<div id="start" class="screen active">
<h1>🔥 NEON CHARADES 😄</h1>
<button class="btn-main" onclick="show('lobby')">▶ START</button>
</div>

<div id="lobby" class="screen">
<h2>👥 Players</h2>
<input id="inp" placeholder="სახელი 😎">
<button class="btn-main" onclick="add()">➕ ADD</button>
<div id="list"></div>
<button id="startBtn" class="btn-main" style="display:none" onclick="makePairs()">🎮 START GAME</button>
</div>

<div id="pair" class="screen">
<h2>👫 PAIR 😆</h2>
<div id="pairText"></div>
<button class="btn-main" onclick="startGame()">🔥 READY</button>
</div>

<div id="game" class="screen">
<div class="timer" id="time">40</div>
<div class="word" id="word">---</div>
<button class="btn-fail" onclick="next(false)">❌ FAIL</button>
<button class="btn-success" onclick="next(true)">✅ DONE</button>
</div>

<div id="result" class="screen">
<h2>⏰ TIME OVER 😆</h2>
<div id="score"></div>
<p id="punish"></p>
<button class="btn-main" onclick="nextPair()">👉 NEXT PAIR</button>
</div>

<script>

/* 🎯 WORDS */
const words=[
"ხინკალი","ბეტმენი","პინგვინი","სელფი","ტიკტოკი","გიტარა","ზვიგენი","კოსმოსი",
"მეკობრე","ზომბი","ვოლდემორი","ფიფა","მაინქრაფტი","ჰარი პოტერი"
];

/* 😈 punishments */
const punish=[
"😂 20 ჩაჯდომა","😆 იმღერე ხმამაღლა","🔥 პლანკა 40წმ",
"🤣 იცეკვე უცნაურად","😜 დაიყვირე NEON!",
"🤪 გააკეთე funny face","😎 იარე რობოტივით",
"😂 უთხარი joke","🔥 სერიოზული სახე 1 წუთი"
];

let players=[],pairs=[],index=0,score=0,time=40,timer;

/* ⭐ stars */
const stars=document.getElementById("stars");
for(let i=0;i<60;i++){
let s=document.createElement("div");
s.className="star";
s.style.left=Math.random()*100+"%";
s.style.top=Math.random()*100+"%";
s.style.animationDuration=(2+Math.random()*4)+"s";
stars.appendChild(s);
}

/* UI */
function show(id){
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

/* players */
function add(){
let v=document.getElementById('inp').value.trim();
if(!v)return;
players.push(v);
document.getElementById('inp').value="";
document.getElementById('list').innerHTML=
players.map(p=>`<span class="player-tag">${p}</span>`).join("");
if(players.length>=2) document.getElementById('startBtn').style.display="block";
}

/* pairs */
function makePairs(){
let sh=[...players].sort(()=>Math.random()-0.5);
pairs=[];
for(let i=0;i<sh.length;i+=2){
pairs.push([sh[i],sh[i+1]||sh[0]]);
}
index=0;
showPair();
}

function showPair(){
document.getElementById('pairText').innerText=pairs[index].join(" + ");
show('pair');
}

/* game */
function startGame(){
score=0;
time=40;
show('game');
nextWord();
clearInterval(timer);
timer=setInterval(()=>{
time--;
document.getElementById('time').innerText=time;
if(time<=0){clearInterval(timer);end();}
},1000);
}

function next(c){
if(c) score++;
nextWord();
}

function nextWord(){
document.getElementById('word').innerText=
words[Math.floor(Math.random()*words.length)];
}

function end(){
document.getElementById('score').innerText="😎 Score: "+score;
document.getElementById('punish').innerText=
punish[Math.floor(Math.random()*punish.length)];
show('result');
}

function nextPair(){
index++;
if(index>=pairs.length){
alert("😂 Game Over!");
location.reload();
return;
}
showPair();
}

</script>

</body>
</html>
